services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./data:/app/public/data
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY:-}
    restart: unless-stopped
